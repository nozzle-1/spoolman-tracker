name: Publish Docker Image

on:
  release:
    types:
      - published
  workflow_call:
    inputs:
      release_tag:
        description: Existing Git tag to publish to GHCR
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing Git tag to publish to GHCR
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-ghcr:
    name: Build and publish GHCR image
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release-ref
        run: |
          tag="${{ inputs.release_tag || github.event.release.tag_name }}"
          if [ -z "$tag" ]; then
            echo "A release tag is required." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release-ref.outputs.tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Compute image tags
        id: version
        run: |
          tag="${{ steps.release-ref.outputs.tag }}"
          version="${tag##*-v}"
          if [ "$version" = "$tag" ]; then
            version="${tag#v}"
          fi
          major_minor="$(printf '%s' "$version" | cut -d. -f1,2)"
          is_stable=true
          case "$version" in
            *-*) is_stable=false ;;
          esac
          {
            echo "version=$version"
            echo "major_minor=$major_minor"
            echo "is_stable=$is_stable"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=latest,enable=${{ steps.version.outputs.is_stable == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
