name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing Git tag to publish to GHCR
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write

jobs:
  release:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-ghcr:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release.outputs.release_created == 'true') }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - id: version
        run: |
          tag="${{ inputs.release_tag }}"
          if [ -z "$tag" ]; then
            tag="$(git describe --tags --abbrev=0)"
          fi
          version="${tag##*-v}"
          if [ "$version" = "$tag" ]; then
            version="${tag#v}"
          fi
          major_minor="$(printf '%s' "$version" | cut -d. -f1,2)"
          is_stable=true
          case "$version" in
            *-*) is_stable=false ;;
          esac
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "major_minor=$major_minor"
            echo "is_stable=$is_stable"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=latest,enable=${{ steps.version.outputs.is_stable == 'true' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
